<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LumSign Quote System V2</title>
<style>
body { font-family: Arial; padding: 20px; }
input { margin-bottom: 10px; padding: 5px; }
button { padding: 6px 12px; cursor: pointer; }
table { margin-top: 30px; border-collapse: collapse; width: 100%; }
th, td { border: 1px solid #ddd; padding: 8px; }
th { background: #f4f4f4; }
</style>
</head>

<body>

<h2>LumSign Quote V2</h2>

<label>Client</label><br>
<input id="clientInput"><br>

<label>Total Price</label><br>
<input id="priceInput"><br>

<button id="saveBtn">Create Quote</button>

<h3>Quote History</h3>
<table>
<thead>
<tr>
<th>Quote No</th>
<th>Client</th>
<th>Total Price</th>
<th>Date</th>
</tr>
</thead>
<tbody id="quoteTable"></tbody>
</table>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
  getFirestore, 
  collection, 
  addDoc, 
  getDocs, 
  query, 
  orderBy, 
  serverTimestamp,
  doc,
  runTransaction
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import { firebaseConfig } from "./firebase-config.js";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const saveBtn = document.getElementById("saveBtn");
const tableBody = document.getElementById("quoteTable");

function pad(num) {
  return String(num).padStart(3, "0");
}

async function generateNumbers() {

  const counterRef = doc(db, "counters", "mainCounter");

  const result = await runTransaction(db, async (transaction) => {

    const counterDoc = await transaction.get(counterRef);

    if (!counterDoc.exists()) {
      throw "Counter document does not exist!";
    }

    let quoteNumber = counterDoc.data().quoteNumber + 1;
    let invoiceNumber = counterDoc.data().invoiceNumber + 1;

    transaction.update(counterRef, {
      quoteNumber: quoteNumber,
      invoiceNumber: invoiceNumber
    });

    const year = new Date().getFullYear();

    return {
      quoteNo: `EVG-Q-${year}-${pad(quoteNumber)}`,
      invoiceNo: `EVG-I-${year}-${pad(invoiceNumber)}`
    };
  });

  return result;
}

saveBtn.addEventListener("click", async () => {

  const client = document.getElementById("clientInput").value.trim();
  const subtotalInput = document.getElementById("priceInput").value.trim();

  if (!client || !subtotalInput) {
    alert("Please fill all fields");
    return;
  }

  const subtotal = parseFloat(subtotalInput);
  const gst = subtotal * 0.05;
  const total = subtotal + gst;
  const deposit = total * 0.65;
  const balance = total * 0.35;

  const numbers = await generateNumbers();

  await addDoc(collection(db, "quotes"), {
    quoteNo: numbers.quoteNo,
    invoiceNo: numbers.invoiceNo,
    client: client,
    subtotal: subtotal,
    gst: gst,
    total: total,
    deposit65: deposit,
    balance35: balance,
    createdAt: serverTimestamp()
  });

  alert("Created:\n" + numbers.quoteNo + "\n" + numbers.invoiceNo);

  location.reload();
});

async function loadQuotes() {

  const q = query(collection(db, "quotes"), orderBy("createdAt", "desc"));
  const snapshot = await getDocs(q);

  tableBody.innerHTML = "";

  snapshot.forEach(doc => {
    const data = doc.data();
    const row = tableBody.insertRow();

    row.insertCell(0).innerText = data.quoteNo || "";
    row.insertCell(1).innerText = data.client || "";
    row.insertCell(2).innerText = "$" + (data.total?.toFixed(2) || "0");
    row.insertCell(3).innerText = data.createdAt?.toDate().toLocaleString() || "";
  });
}

loadQuotes();

</script>

</body>
</html>
