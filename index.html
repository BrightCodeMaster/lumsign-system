<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LumSign Quote System V2</title>
<style>
body { font-family: Arial; padding: 20px; }
input { margin-bottom: 10px; padding: 5px; }
button { padding: 6px 12px; cursor: pointer; }
table { margin-top: 30px; border-collapse: collapse; width: 100%; }
th, td { border: 1px solid #ddd; padding: 8px; }
th { background: #f4f4f4; }
</style>
</head>

<body>

<h2>LumSign Quote V2</h2>

<label>Client</label><br>
<input id="clientInput"><br>

<label>Total Price</label><br>
<input id="priceInput"><br>

<button id="saveBtn">Create Quote</button>

<h3>Quote History</h3>
<table>
<thead>
<tr>
<th>Quote No</th>
<th>Client</th>
<th>Total Price</th>
<th>Date</th>
</tr>
</thead>
<tbody id="quoteTable"></tbody>
</table>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, orderBy, serverTimestamp } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import { firebaseConfig } from "./firebase-config.js";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const saveBtn = document.getElementById("saveBtn");
const tableBody = document.getElementById("quoteTable");

async function generateQuoteNumber() {
    const year = new Date().getFullYear();
    const snapshot = await getDocs(collection(db, "quotes"));

    const currentYearQuotes = snapshot.docs.filter(doc => {
        const data = doc.data();
        return data.quoteNo && data.quoteNo.startsWith(`EVG-${year}`);
    });

    const nextNumber = currentYearQuotes.length + 1;
    const padded = String(nextNumber).padStart(3, '0');

    return `EVG-${year}-${padded}`;
}

saveBtn.addEventListener("click", async () => {
    const client = document.getElementById("clientInput").value.trim();
    const totalPrice = document.getElementById("priceInput").value.trim();

    if (!client || !totalPrice) {
        alert("Please fill all fields");
        return;
    }

    const quoteNo = await generateQuoteNumber();

    await addDoc(collection(db, "quotes"), {
        quoteNo: quoteNo,
        client: client,
        totalPrice: totalPrice,
        createdAt: serverTimestamp()
    });

    alert("Quote Created: " + quoteNo);
    location.reload();
});

async function loadQuotes() {
    const q = query(collection(db, "quotes"), orderBy("createdAt", "desc"));
    const snapshot = await getDocs(q);

    tableBody.innerHTML = "";

    snapshot.forEach(doc => {
        const data = doc.data();

        const row = tableBody.insertRow();

        row.insertCell(0).innerText = data.quoteNo || "";
        row.insertCell(1).innerText = data.client || "";
        row.insertCell(2).innerText = data.totalPrice || "";
        row.insertCell(3).innerText = data.createdAt?.toDate().toLocaleString() || "";
    });
}

loadQuotes();

</script>

</body>
</html>
